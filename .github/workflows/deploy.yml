name: Deploy Chrome Extension to Store

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g. 1.2.0). Leave empty to deploy current manifest version as-is.'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bump version in manifest
        if: inputs.version != ''
        env:
          VERSION: ${{ inputs.version }}
        run: |
          cd extension
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" manifest.json
          echo "Updated manifest.json to version ${VERSION}"
          grep '"version"' manifest.json

      - name: Package Extension
        run: |
          cd extension
          zip -r ../extension.zip * \
            -x "*.git*"

      - name: Upload & Publish to Chrome Web Store
        uses: mobilefirstllc/cws-publish@latest
        with:
          action: 'publish'
          client_id: ${{ secrets.CHROME_CLIENT_ID }}
          client_secret: ${{ secrets.CHROME_EXTENSION_SECRET }}
          refresh_token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          extension_id: ${{ secrets.CHROME_APP_ID }}
          zip_file: './extension.zip'
